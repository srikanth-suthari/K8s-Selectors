apiVersion: v1
kind: Pod
metadata:
  name: node-affinity-with-preff
spec:
  affinity:
    nodeAffinity:
      # This soft rule schedules the pods even if the labels are missing and schedules the pods elsewhere in cluster
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: roboshop
                operator: In
                values:
                  - node-5      # we do not have the node-5 in our cluster
  containers:
    - name: nginx
      image: nginx