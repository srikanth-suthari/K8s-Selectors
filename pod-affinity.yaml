apiVersion: v1
kind: Pod
metadata:
  name: pod-affinity
  labels:
    project: roboshop
spec:
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              project: roboshop
          topologyKey: kubernetes.io/hostname
  containers:
    - name: nginx
      image: nginx